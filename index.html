<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Golden Candys</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#fffaf7;

font-family:Poppins,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.card{

max-width:420px;

width:100%;

background:white;

border-radius:30px;

padding:35px;

box-shadow:0 15px 40px rgba(0,0,0,.12);

text-align:center;

}

.logo{

font-family:'Cormorant Garamond',serif;

font-size:48px;

color:#8B1E3F;

margin-bottom:5px;

}

.sub{

color:#D4AF37;

font-size:18px;

margin-bottom:30px;

}

h2{

margin-bottom:20px;

color:#444;

}

#frase{

font-size:24px;

font-weight:500;

color:#8B1E3F;

min-height:150px;

display:flex;

align-items:center;

justify-content:center;

animation:fade .6s;

}

button{

margin-top:25px;

background:#8B1E3F;

color:white;

border:none;

padding:15px 25px;

border-radius:50px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#6f1732;

}

.instagram{

margin-top:30px;

font-size:15px;

}

.instagram a{

color:#8B1E3F;

text-decoration:none;

font-weight:bold;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">Golden Candys</div>

<div class="sub">

Mais que um brigadeiro.

<br>

Uma mensagem para adoçar seu dia.

</div>

<h2>🍫 Sua mensagem especial</h2>

<div id="frase"></div>

<button onclick="novaFrase()">

Receber outra mensagem

</button>

<div class="instagram">

Conheça também nossa loja de semijoias ✨

<br><br>

<a href="https://instagram.com/" target="_blank">

Clique aqui

</a>

</div>

</div>

<script>

const frases=[

"Que seu dia seja tão doce quanto este brigadeiro. 🤍",

"Deus está cuidando de tudo. ✨",

"Você é mais forte do que imagina. 💛",

"Continue. Grandes sonhos levam tempo. 🌻",

"Você merece viver coisas lindas. 🤎",

"Nunca desista dos seus sonhos. 🍫"

];

function novaFrase(){

const numero=Math.floor(Math.random()*frases.length);

document.getElementById("frase").innerHTML=frases[numero];

}

novaFrase();

</script>

</body>

</html>
